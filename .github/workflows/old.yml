name: Android 内核驱动编译 (最终稳定版)
on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本 (例如 14)'
        required: true
      kernel_version:
        description: '内核版本 (例如 6.1)'
        required: true
      driver_name:
        description: '驱动模块名 (例如 gs_mem.ko)'
        required: true
        default: 'gs_mem.ko'
      target_arch:
        description: '目标架构 (aarch64, x86_64)'
        required: true
        default: 'aarch64'
      clean_cache:
        description: '强制重新下载内核（清理缓存）'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4.2.2

      - name: 缓存内核源码
        id: cache-kernel
        uses: actions/cache@v3
        with:
          path: android-kernel
          key: kernel-${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.target_arch }}

      - name: 准备驱动文件
        run: |
          mkdir -p kerneldriver
          cp ./code/*.c ./code/*.h ./code/Makefile kerneldriver/ 2>/dev/null || true

      - name: 安装 repo 工具
        run: |
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: 清理缓存
        if: inputs.clean_cache == true
        run: |
          rm -rf android-kernel

      - name: 下载内核源码
        if: steps.cache-kernel.outputs.cache-hit != 'true' || inputs.clean_cache == true
        run: |
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }}
          repo sync -j$(nproc) -c --no-tags --optimized-fetch --force-sync

      - name: 放入驱动到 staging
        run: |
          cd android-kernel
          rm -rf common/drivers/staging/kerneldriver
          mkdir -p common/drivers/staging/kerneldriver
          cp -r ../kerneldriver/* common/drivers/staging/kerneldriver/

      - name: 配置 Makefile
        run: |
          cd android-kernel
          sed -i '/kerneldriver/d' common/drivers/staging/Makefile
          echo "obj-y += kerneldriver/" >> common/drivers/staging/Makefile

      - name: 加入 GKI 模块列表 (Android14+)
        if: ${{ github.event.inputs.android_version > 13 }}
        run: |
          cd android-kernel
          MODULE_NAME="drivers/staging/kerneldriver/${{ github.event.inputs.driver_name }}"
          awk -i inplace -v module="$MODULE_NAME" '
          BEGIN {added=0}
          /_COMMON_GKI_MODULES_LIST = \[/ {in_list=1}
          in_list && /\]/ {
              if (!added) {print "    \"" module "\","; added=1}
              in_list=0
          }
          in_list && !added { if (module < $0) {print "    \"" module "\","; added=1} }
          {print}' common/modules.bzl

      - name: 加入模块列表 (Android13-)
        if: ${{ github.event.inputs.android_version <= 13 }}
        run: |
          cd android-kernel
          sed -i '/kerneldriver/d' common/android/gki_${{ github.event.inputs.target_arch }}_modules
          echo "drivers/staging/kerneldriver/${{ github.event.inputs.driver_name }}" >> common/android/gki_${{ github.event.inputs.target_arch }}_modules

      - name: 提高栈帧限制
        run: |
          cd android-kernel
          find . -name Makefile\* -exec sed -i 's/-Wframe-larger-than=[0-9]*/-Wframe-larger-than=4096/g' {} +
          grep -q FRAME_WARN common/Makefile || echo 'KBUILD_CFLAGS += -Wframe-larger-than=4096' >> common/Makefile

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc python-is-python3

      - name: 编译
        run: |
          cd android-kernel
          if [ ${{ github.event.inputs.android_version }} -le 13 ]; then
            BUILD_CONFIG=common/build.config.gki.${{ github.event.inputs.target_arch }} LTO=thin build/build.sh -j32
            OUTPUT_PATH="out/android${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }}/dist"
          else
            tools/bazel run //common:kernel_${{ github.event.inputs.target_arch }}_dist
            OUTPUT_PATH="out/kernel_${{ github.event.inputs.target_arch }}"
          fi
          echo "OUTPUT_PATH=$OUTPUT_PATH" >> $GITHUB_ENV

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: driver-${{ github.event.inputs.target_arch }}
          path: android-kernel/${{ env.OUTPUT_PATH }}/*.ko
