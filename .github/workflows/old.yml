name: Android GKI Driver Builder (Lite - NO kernel source)
on:
  workflow_dispatch:
    inputs:
      driver_name:
        description: '驱动模块名 (例如 gs_mem.ko)'
        required: true
        default: 'gs_mem.ko'
      arch:
        description: '架构 (aarch64)'
        required: true
        default: 'aarch64'
      android_version:
        description: 'Android 版本 (10/11/12/13/14)'
        required: true
        default: '13'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu make perl flex bison libssl-dev libelf-dev

      - name: Prepare build environment
        run: |
          mkdir -p driver
          cp code/* driver/ 2>/dev/null || true

      - name: Create Makefile
        run: |
          cat > driver/Makefile << EOF
          obj-m += $(echo ${{ github.event.inputs.driver_name }} | sed 's/.ko//').o
          KERNELRELEASE := 5.10
          CROSS_COMPILE := aarch64-linux-gnu-
          ARCH := arm64
          KDIR := /lib/modules/\$(KERNELRELEASE)/build
          EXTRA_CFLAGS += -Wno-declaration-after-statement -Wno-unused-function
          EOF

      - name: Build driver module
        run: |
          cd driver
          make -C /lib/modules/$(uname -r)/build M=$(pwd) modules CROSS_COMPILE=aarch64-linux-gnu- ARCH=arm64

      - name: Upload final .ko
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.driver_name }}
          path: driver/*.ko
